            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarSupportedContent">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarSupportedContent">
                <ul class="navbar-nav m-auto mb-2 mb-lg-0">

                <form class="d-flex" role="search">
                    <input class="form-control me-2" type="search" placeholder="Search">

            </div>

<main>
<main>
    <section id="contact-us" class="py-5">
        <div class="container">
            <h2 class="text-center py-4">Contact Us</h2>
            
            <div class="row justify-content-center">
                <div class="col-md-6"> 
                    <form class="shadow p-4 rounded bg-light"> <div class="mb-3">
                            <label for="email" class="form-label">Email address</label>
                            <input type="email" class="form-control" id="email" placeholder="name@example.com">
                            <div class="form-text text-muted">We'll never share your email with anyone else.</div>
                        </div>
                        
                        <div class="mb-3">
                            <label for="message" class="form-label">Message</label>
                            <textarea class="form-control" id="message" rows="4" placeholder="How can we help you?"></textarea>
                        </div>
                        
                        <div class="mb-3 form-check">
                            <input type="checkbox" class="form-check-input" id="check">
                            <label class="form-check-label" for="check">I agree to the terms</label>
                        </div>
                        
                        <button type="submit" class="btn btn-success w-100 py-2 submitBtn">Submit</button>
                    </form>
                </div>
            </div>
        </div>
    </section>
</main>

</main>
